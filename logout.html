<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="logout.css">
    <title>Form Input Wave</title>
</head>
<body>
   <div class="container">
       <h1>Please Login</h1>
       <form>
        <div class="form-control>
            <input type="text" required>
            <label>Username</label>
        <div class="form-control">
            <input type="email" required >
            <label>Email</label>
        </div>
        <div class="form-control">
            <input type="password" required >
            <label>Password</label>
        </div>
        <div class="form-controll">
            <input type="number" required>
            <label>Pone number</label>
        </div>
        <button class="btn">Login</button>
        <p class="text">Don't have an account? <a href="#">Sign up</a></p>
     <label>
         <input type="checkbox" name="verification" value="Remember me">Remember me
     </label>
     <label>
         <input type="checkbox" name="verification" value="storage">Keep me signed in
     </label>       
       </form>
   </div>

</body>
    <script src="logout.js"></script>
</html>
